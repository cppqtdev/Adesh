  <body>
    <script>
      // Apply saved theme before first paint to avoid a flash
      try {
        var t = localStorage.getItem('theme')
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        document.documentElement.dataset.theme = t
      } catch (e) {}
    </script>
